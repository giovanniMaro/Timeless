<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELESS EVENTS | Official Hub</title>
    <style>
        :root {
            --timeless-purple: #c71efb;
            --pov-pink: #ff00ab;
            --t2a-cyan: #00f2ff;
            --dark-bg: #000000;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            display: none; position: fixed; z-index: 10000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.98);
            align-items: center; justify-content: center; cursor: pointer;
            backdrop-filter: blur(10px);
        }
        #lightbox img { max-width: 95%; max-height: 90%; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .close-lb { position: absolute; top: 25px; right: 35px; font-size: 50px; color: white; font-weight: 200; line-height: 1; }

        /* --- HOME PAGE --- */
        #home-page {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex-grow: 1; padding: 40px 20px; box-sizing: border-box;
        }

        header { text-align: center; margin-bottom: 80px; width: 100%; display: flex; justify-content: center; }
        
        .main-logo {
            width: 380px; max-width: 90%; height: auto;
            filter: drop-shadow(0 0 25px rgba(199, 30, 251, 0.4));
            animation: logoFadeIn 1.5s ease-out;
        }

        @keyframes logoFadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .hub-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 40px; width: 100%; max-width: 1100px;
        }

        .card {
            background-color: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--border-color); border-radius: 32px;
            padding: 60px 40px; text-align: center; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .card-pov:hover { border-color: var(--pov-pink); box-shadow: 0 25px 60px rgba(255, 0, 171, 0.25); transform: translateY(-15px); }
        .card-t2a:hover { border-color: var(--t2a-cyan); box-shadow: 0 25px 60px rgba(0, 242, 255, 0.25); transform: translateY(-15px); }

        .card img { max-width: 240px; height: auto; margin-bottom: 40px; transition: 0.5s ease; }
        .card:hover img { transform: scale(1.05); }

        .btn-enter {
            display: flex; align-items: center; gap: 12px; font-size: 0.85rem; font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 35px; border-radius: 50px; transition: all 0.4s ease;
        }

        .card-pov:hover .btn-enter { background-color: var(--pov-pink); color: #000; border-color: transparent; }
        .card-t2a:hover .btn-enter { background-color: var(--t2a-cyan); color: #000; border-color: transparent; }

        /* --- GALLERY --- */
        #gallery-page { display: none; width: 100%; animation: galleryFadeIn 0.6s ease; }
        @keyframes galleryFadeIn { from { opacity: 0; } to { opacity: 1; } }

        .gallery-header {
            text-align: center; padding: 50px 20px; position: sticky; top: 0;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gallery-header h1 { font-size: 1.8rem; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; }

        .btn-back {
            background-color: #fff; color: #000; border: none; padding: 14px 35px;
            border-radius: 50px; cursor: pointer; font-weight: 800; letter-spacing: 2px;
        }

        .photo-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px; padding: 20px; max-width: 1600px; margin: 0 auto;
        }

        .photo-grid img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px;
            cursor: pointer; transition: 0.4s ease; background: #111;
        }
        .photo-grid img:hover { transform: scale(1.03); filter: brightness(1.1); }

        footer { padding: 60px 20px; text-align: center; color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 3px; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .main-logo { width: 280px; }
            .hub-container { grid-template-columns: 1fr; }
            .photo-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>

    </div>

        <div class="hub-container">
            <div class="card card-pov" onclick="mostraGallery('pov')">

                <div class="btn-enter">Vedi Gallery →</div>
            </div>

            <div class="card card-t2a" onclick="mostraGallery('t2a')">
                <img src="https://res.cloudinary.com/digxjfslu/image/upload/v1776865857/TIME2APE_DEF_BIANCO_t0yc4o.png" alt="Time2Ape">
                <div class="btn-enter">Vedi Gallery →</div>
            </div>
        </div>
    </div>

            <button class="btn-back" onclick="tornaHome()">← BACK TO HUB</button>

        function mostraGallery(tipo) {
            const home = document.getElementById('home-page');
            const gallery = document.getElementById('gallery-page');
            const griglia = document.getElementById('griglia-foto');
            const titolo = document.getElementById('titolo-gallery');

            griglia.innerHTML = '';
            home.classList.add('hidden');
            gallery.style.display = 'block';

            let lista = tipo === 'pov' ? fotoPOV : fotoT2A;
            titolo.innerText = tipo === 'pov' ? 'POV GALLERY' : 'TIME2APE GALLERY';
            titolo.style.color = tipo === 'pov' ? 'var(--pov-pink)' : 'var(--t2a-cyan)';
            titolo.style.textShadow = tipo === 'pov' ? '0 0 20px rgba(255,0,171,0.5)' : '0 0 20px rgba(0,242,255,0.5)';

            lista.forEach(url => {
                const img = document.createElement('img');
                img.src = url.replace('/upload/', '/upload/w_600,q_auto,f_auto/');
                img.loading = "lazy";
                img.onclick = () => openLightbox(url);
                griglia.appendChild(img);
            });
            window.scrollTo(0,0);
        }

        function tornaHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('gallery-page').style.display = 'none';
        }

        function openLightbox(url) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lb-img');
            lbImg.src = url.replace('/upload/', '/upload/w_1200,q_auto,f_auto/');
            lb.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
