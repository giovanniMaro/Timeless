    <meta charset="UTF-8">

    <style>
        :root {
            --timeless-purple: #c71efb;
            --pov-pink: #ff00ab;
            --t2a-cyan: #00f2ff;
            --dark-bg: #000000;
            --card-bg: #0d0d0d;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HOME PAGE STYLE --- */
        #home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
        }

        header {
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #1a002a 0%, #000 70%);
        }

        .main-logo {
            width: 250px;
            filter: drop-shadow(0 0 20px rgba(199, 30, 251, 0.5));
            transition: transform 0.5s ease;
        }

        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            width: 90%;
            max-width: 1100px;
            margin-top: -20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            pointer-events: none;
        }

        .card-pov:hover { border-color: var(--pov-pink); box-shadow: 0 20px 50px rgba(255, 0, 171, 0.2); transform: translateY(-15px); }
        .card-t2a:hover { border-color: var(--t2a-cyan); box-shadow: 0 20px 50px rgba(0, 242, 255, 0.2); transform: translateY(-15px); }

        .card img {
            max-width: 220px;
            margin-bottom: 30px;
            filter: grayscale(0.2);
            transition: 0.4s;
        }

        .card:hover img { filter: grayscale(0); transform: scale(1.05); }

        .btn-enter {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .card-pov:hover .btn-enter { background: var(--pov-pink); color: #000; border-color: var(--pov-pink); }
        .card-t2a:hover .btn-enter { background: var(--t2a-cyan); color: #000; border-color: var(--t2a-cyan); }

        /* --- GALLERY STYLE --- */
        #gallery-page {
            display: none;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .gallery-header {
            text-align: center;
            padding: 50px 20px;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 1px solid #111;
        }

        .btn-back {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-top: 20px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .photo-grid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            background: #0a0a0a;
            transition: transform 0.4s;
        }

        .photo-grid img:hover { transform: scale(1.02); }

        footer { padding: 60px; text-align: center; color: #222; font-size: 0.7rem; letter-spacing: 3px; }
        .hidden { display: none !important; }
    </style>

        function mostraGallery(tipo) {
            const home = document.getElementById('home-page');
            const gallery = document.getElementById('gallery-page');
            const griglia = document.getElementById('griglia-foto');
            const titolo = document.getElementById('titolo-gallery');

            griglia.innerHTML = '';
            home.classList.add('hidden');
            gallery.style.display = 'block';

            let lista = tipo === 'pov' ? fotoPOV : fotoT2A;
            titolo.innerText = tipo === 'pov' ? 'P.O.V. GALLERY' : 'TIME2APE GALLERY';
            titolo.style.color = tipo === 'pov' ? 'var(--pov-pink)' : 'var(--t2a-cyan)';

            lista.forEach(url => {
                const img = document.createElement('img');
                // Magia Cloudinary: w_800 (larghezza), q_auto (qualità automatica), f_auto (formato più leggero)
                img.src = url.replace('/upload/', '/upload/w_800,q_auto,f_auto/');
                img.loading = "lazy";
                griglia.appendChild(img);
            });
            window.scrollTo(0,0);
        }

        function tornaHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('gallery-page').style.display = 'none';
        }
