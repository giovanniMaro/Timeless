    <title>TIMELESS EVENTS | Official Hub</title>
    <style>
        :root {
            --timeless-purple: #c71efb;
            --pov-pink: #ff00ab;
            --t2a-cyan: #00f2ff;
            --dark-bg: #000000;
            --card-bg: rgba(20, 20, 20, 0.6); /* Glassmorphism background */
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- LIGHTBOX (VISUALIZZATORE) --- */
        #lightbox {
            display: none; position: fixed; z-index: 10000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.98);
            align-items: center; justify-content: center; cursor: pointer;
            backdrop-filter: blur(10px);
        }
        #lightbox img { max-width: 95%; max-height: 90%; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); }
        .close-lb { position: absolute; top: 25px; right: 35px; font-size: 50px; color: white; font-weight: 200; line-height: 1; }

        /* --- HOME PAGE STYLE --- */
        #home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .main-logo {
            width: 380px;
            max-width: 90%;
            height: auto;
            filter: drop-shadow(0 0 25px rgba(199, 30, 251, 0.4));
            animation: logoFadeIn 1.5s ease-out;
        }

        @keyframes logoFadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Overlay raffinato all'hover */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
        .card:hover::after { opacity: 1; }

        .card-pov:hover {
            border-color: var(--pov-pink);
            box-shadow: 0 25px 60px rgba(255, 0, 171, 0.25);
            transform: translateY(-15px) scale(1.02);
        }

        .card-t2a:hover {
            border-color: var(--t2a-cyan);
            box-shadow: 0 25px 60px rgba(0, 242, 255, 0.25);
            transform: translateY(-15px) scale(1.02);
        }

        .card img {
            max-width: 240px;
            height: auto;
            margin-bottom: 40px;
            filter: grayscale(0.1);
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        .card:hover img {
            filter: grayscale(0);
            transform: scale(1.05);
        }

        /* Bottoni minimali con icona */
        .btn-enter {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: var(--text-primary);
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 35px;
            border-radius: 50px;
            transition: all 0.4s ease;
            position: relative;
            background: transparent;
        }

        .btn-enter .icon-arrow {
            font-size: 1.1rem;
            transition: transform 0.4s ease;
        }

        .card:hover .btn-enter {
            border-color: transparent;
            color: #000;
        }
        
        .card:hover .btn-enter .icon-arrow {
            transform: translateX(5px);
        }

        .card-pov:hover .btn-enter { background-color: var(--pov-pink); box-shadow: 0 0 20px rgba(255, 0, 171, 0.6); }
        .card-t2a:hover .btn-enter { background-color: var(--t2a-cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.6); }

        /* --- GALLERY STYLE --- */
        #gallery-page {
            display: none;
            width: 100%;
            animation: galleryFadeIn 0.6s ease;
            flex-grow: 1;
        }

        @keyframes galleryFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .gallery-header {
            text-align: center;
            padding: 50px 20px;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gallery-header h1 {
            font-size: 1.8rem;
            letter-spacing: 12px;
            margin: 0 0 20px 0;
            font-weight: 900;
            text-transform: uppercase;
        }

        .btn-back {
            background-color: var(--text-primary);
            color: #000;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-back:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
        }
        
        .btn-back:active { transform: translateY(0); }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .photo-grid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            background-color: #111;
            cursor: pointer;
            transition: transform 0.4s ease, filter 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .photo-grid img:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 3px;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
            width: 100%;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        /* Media Queries per Mobile */
        @media (max-width: 768px) {
            header { margin-bottom: 60px; padding: 40px 10px; }
            .main-logo { width: 300px; }
            .hub-container { grid-template-columns: 1fr; padding: 0 10px; }
            .card { padding: 40px 20px; border-radius: 24px; }
            .card img { max-width: 200px; margin-bottom: 30px; }
            .btn-enter { padding: 12px 25px; font-size: 0.8rem; letter-spacing: 2px; }
            .gallery-header h1 { font-size: 1.4rem; letter-spacing: 8px; }
            .photo-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; padding: 10px; }
            .btn-back { padding: 12px 30px; font-size: 0.75rem; }
        }
    </style>
</head>

            gallery.style.display = 'block';

            // Scegli la lista foto e imposta il titolo
            let lista = tipo === 'pov' ? fotoPOV : fotoT2A;
            titolo.innerText = tipo === 'pov' ? 'POV GALLERY' : 'TIME2APE GALLERY';
            titolo.style.color = tipo === 'pov' ? 'var(--pov-pink)' : 'var(--t2a-cyan)';
            titolo.style.textShadow = tipo === 'pov' ? '0 0 20px rgba(255, 0, 171, 0.5)' : '0 0 20px rgba(0, 242, 255, 0.5)';

            // Carica le immagini nella griglia
            lista.forEach(url => {
                const img = document.createElement('img');
                // Ottimizzazione Cloudinary al volo: w_600 (larghezza 600px), q_auto (qualità automatica), f_auto (formato automatico)
                img.src = url.replace('/upload/', '/upload/w_600,q_auto,f_auto/');
                img.alt = "Photograph from Timeless Event";
                img.loading = "lazy"; // Caricamento lazy per performance
                img.onclick = () => openLightbox(url); // Apre lightbox al click
                griglia.appendChild(img);
            });
            // Torna in cima alla pagina
            window.scrollTo(0,0);
        }

        function tornaHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('gallery-page').style.display = 'none';
        }

        // --- LOGICA LIGHTBOX ---

        function openLightbox(url) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lb-img');
            // Carica immagine a qualità più alta per il lightbox (w_1200)
            lbImg.src = url.replace('/upload/', '/upload/w_1200,q_auto,f_auto/');
            lb.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        // Supporto ESC per chiudere lightbox
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
