<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELESS EVENTS | Hub</title>
    <style>
        /* COLORI LOGHI */
        :root {
            --timeless-purple: #c71efb;
            --pov-pink: #ff00ab;
            --pov-cyan: #00f2ff;
            --dark-bg: #000000;
            --card-bg: #0a0a0a;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER COL LOGO TIMELESS */
        header {
            padding: 50px 20px;
            text-align: center;
        }

        .main-logo {
            width: 200px; /* Logo Timeless */
            filter: drop-shadow(0 0 10px rgba(199, 30, 251, 0.3));
        }

        /* GRIGLIA SEZIONI */
        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 300px;
        }

        /* EFFETTI HOVER P.O.V. */
        .card-pov:hover {
            border-color: var(--pov-pink);
            box-shadow: 0 0 40px rgba(255, 0, 171, 0.2);
            transform: translateY(-10px);
        }

        /* EFFETTI HOVER TIME2APE */
        .card-t2a:hover {
            border-color: var(--pov-cyan);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            transform: translateY(-10px);
        }

        .card img {
            max-width: 180px;
            margin-bottom: 20px;
        }

        .btn {
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card-pov:hover .btn { background: var(--pov-pink); color: black; border-color: var(--pov-pink); }
        .card-t2a:hover .btn { background: var(--pov-cyan); color: black; border-color: var(--pov-cyan); }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #333;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .hub-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://via.placeholder.com/300x300/000/fff?text=LOGO+TIMELESS" class="main-logo" alt="Timeless">
    </header>

    <div class="hub-container">
        
        <a href="/pov" class="card card-pov">
            <img src="https://via.placeholder.com/200x100/000/fff?text=LOGO+POV" alt="P.O.V.">
            <div class="btn">Entra nella Gallery</div>
        </a>

        <a href="/time2ape" class="card card-t2a">
            <img src="https://via.placeholder.com/200x100/000/fff?text=TIME2APE" alt="Time2Ape">
            <div class="btn">Entra nella Gallery</div>
        </a>

    </div>

    <footer>
        &copy; 2024 TIMELESS PRODUCTIONS
    </footer>

</body>
</html>ml>
