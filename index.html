<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELESS EVENTS</title>
    <style>
        :root {
            --pov-pink: #ff00ab;
            --t2a-cyan: #00f2ff;
            --bg: #000;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- SCHERMATA HOME --- */
        #home-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .main-logo-timeless {
            width: 200px;
            margin-bottom: 50px;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 900px;
        }

        .choice-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            cursor: pointer;
            transition: 0.3s;
        }

        .choice-card:hover { transform: translateY(-10px); }
        .card-pov:hover { border-color: var(--pov-pink); box-shadow: 0 0 30px rgba(255, 0, 171, 0.2); }
        .card-t2a:hover { border-color: var(--t2a-cyan); box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); }

        .choice-card img { width: 150px; }

        /* --- SCHERMATA GALLERY (Nascosta all'inizio) --- */
        #gallery-screen {
            display: none;
            padding: 20px;
        }

        header {
            padding: 30px;
            text-align: center;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.9);
            z-index: 10;
        }

        .btn-back {
            background: none;
            border: 1px solid #333;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 40px auto;
        }

        .grid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="home-screen">
        <img src="URL_LOGO_TIMELESS_CLOUDINARY" class="main-logo-timeless" alt="Timeless">
        <div class="hub-grid">
            <div class="choice-card card-pov" onclick="openGallery('pov')">
                <img src="URL_LOGO_POV_CLOUDINARY" alt="POV">
                <p>VEDI FOTO</p>
            </div>
            <div class="choice-card card-t2a" onclick="openGallery('t2a')">
                <img src="https://via.placeholder.com/150x80?text=TIME2APE" alt="T2A">
                <p>VEDI FOTO</p>
            </div>
        </div>
    </div>

    <div id="gallery-screen">
        <header>
            <h1 id="gallery-title">GALLERY</h1>
            <button class="btn-back" onclick="closeGallery()">← TORNA INDIETRO</button>
        </header>
        <div class="grid" id="photo-grid"></div>
    </div>

    <script>
        // --- I TUOI ELENCHI FOTO ---
        const fotoPOV = [
            "URL_FOTO_POV_1",
            "URL_FOTO_POV_2"
        ];

        const fotoT2A = [
            "URL_FOTO_T2A_1",
            "URL_FOTO_T2A_2"
        ];

        function openGallery(type) {
            const home = document.getElementById('home-screen');
            const gallery = document.getElementById('gallery-screen');
            const grid = document.getElementById('photo-grid');
            const title = document.getElementById('gallery-title');
            
            grid.innerHTML = ''; // Svuota gallery precedente
            home.classList.add('hidden');
            gallery.style.display = 'block';

            let lista = type === 'pov' ? fotoPOV : fotoT2A;
            title.innerText = type === 'pov' ? 'P.O.V. GALLERY' : 'TIME2APE GALLERY';
            title.style.color = type === 'pov' ? 'var(--pov-pink)' : 'var(--t2a-cyan)';

            lista.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.loading = "lazy";
                grid.appendChild(img);
            });
        }

        function closeGallery() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('gallery-screen').style.display = 'none';
        }
    </script>
</body>
</html>
