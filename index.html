<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELESS EVENTS | Official Gallery</title>
    <style>
        :root {
            --timeless-purple: #c71efb;
            --pov-pink: #ff00ab;
            --t2a-cyan: #00f2ff;
            --dark-bg: #000000;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HOME --- */
        #home-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 50px;
        }

        header { padding: 60px 20px; text-align: center; }
        .main-logo { width: 220px; filter: drop-shadow(0 0 15px rgba(199, 30, 251, 0.4)); }

        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1000px;
        }

        .card {
            background: #080808;
            border: 1px solid #1a1a1a;
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 320px;
        }

        .card-pov:hover { border-color: var(--pov-pink); box-shadow: 0 0 40px rgba(255, 0, 171, 0.15); transform: translateY(-10px); }
        .card-t2a:hover { border-color: var(--t2a-cyan); box-shadow: 0 0 40px rgba(0, 242, 255, 0.15); transform: translateY(-10px); }
        
        .card img { max-width: 200px; margin-bottom: 25px; }
        .btn-label { font-weight: 800; letter-spacing: 3px; font-size: 0.8rem; opacity: 0.7; }

        /* --- GALLERY --- */
        #gallery-page {
            display: none;
            width: 100%;
        }

        .gallery-header {
            text-align: center;
            padding: 40px 20px;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid #111;
        }

        .btn-back {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back:hover { background: #222; border-color: #555; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
            padding: 10px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .photo-grid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 4px;
            background: #0a0a0a;
            transition: opacity 0.3s;
        }

        footer { margin-top: auto; padding: 40px; text-align: center; color: #333; font-size: 0.7rem; letter-spacing: 2px; }
        .hidden { display: none !important; }
    </style>
</head>

    </div>

        function mostraGallery(tipo) {
            const home = document.getElementById('home-page');
            const gallery = document.getElementById('gallery-page');
            const griglia = document.getElementById('griglia-foto');
            const titolo = document.getElementById('titolo-gallery');

            griglia.innerHTML = ''; 
            home.classList.add('hidden');
            gallery.style.display = 'block';

            let lista = tipo === 'pov' ? fotoPOV : fotoT2A;
            titolo.innerText = tipo === 'pov' ? 'P.O.V. GALLERY' : 'TIME2APE GALLERY';
            titolo.style.color = tipo === 'pov' ? 'var(--pov-pink)' : 'var(--t2a-cyan)';

            lista.forEach(url => {
                const img = document.createElement('img');
                img.src = url.replace('/upload/', '/upload/w_600,q_auto,f_auto/'); // Ottimizzazione automatica
                img.loading = "lazy";
                griglia.appendChild(img);
            });
            window.scrollTo(0,0);
        }

        function tornaHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('gallery-page').style.display = 'none';
        }
