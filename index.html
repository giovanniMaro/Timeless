<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMELESS EVENTS | Official Hub</title>
    <style>
        :root {
            --timeless-purple: #c71efb;
            --pov-pink: #ff00ab;
            --t2a-cyan: #00f2ff;
            --dark-bg: #000000;
            --card-bg: #0d0d0d;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            display: none; position: fixed; z-index: 9999; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            align-items: center; justify-content: center; cursor: pointer;
        }
        #lightbox img { max-width: 90%; max-height: 85%; border-radius: 10px; border: 1px solid #333; }
        .close-lb { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; }

        /* --- HOME PAGE --- */
        #home-page { display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }
        
        header { 
            padding: 60px 20px; text-align: center; width: 100%;
            background: linear-gradient(to bottom, #11001a 0%, #000 100%);
        }
        
        .main-logo { width: 320px; max-width: 85%; filter: drop-shadow(0 0 15px rgba(199, 30, 251, 0.3)); }

        .hub-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px; width: 90%; max-width: 1100px; margin-top: 20px;
        }

        .card {
            background: var(--card-bg); border: 1px solid #1a1a1a; border-radius: 40px;
            padding: 60px 40px; text-align: center; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .card-pov:hover { border-color: var(--pov-pink); box-shadow: 0 15px 40px rgba(255, 0, 171, 0.2); transform: translateY(-10px); }
        .card-t2a:hover { border-color: var(--t2a-cyan); box-shadow: 0 15px 40px rgba(0, 242, 255, 0.2); transform: translateY(-10px); }
        
        .card img { max-width: 240px; height: auto; margin-bottom: 30px; }
        .btn-enter { font-size: 0.75rem; font-weight: 900; letter-spacing: 3px; border: 1px solid #333; padding: 12px 30px; border-radius: 50px; text-transform: uppercase; }

        /* --- GALLERY --- */
        #gallery-page { display: none; width: 100%; animation: fadeIn 0.4s ease; }
        .gallery-header {
            text-align: center; padding: 40px 20px; position: sticky; top: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100;
        }
        .btn-back { background: #fff; color: #000; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 800; margin-top: 15px; }
        
        .photo-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px; padding: 15px; max-width: 1400px; margin: 0 auto;
        }
        .photo-grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .photo-grid img:hover { transform: scale(1.02); filter: brightness(1.1); }

        footer { padding: 50px; text-align: center; color: #333; font-size: 0.7rem; letter-spacing: 2px; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-lb">&times;</span>
        <img id="lb-img" src="">
    </div>

    <div id="home-page">
        <header>
            <img src="https://res.cloudinary.com/digxjfslu/image/upload/v1776864938/TIMELESS_3_adaqtc.png" class="main-logo" alt="Timeless">
        </header>

        <div class="hub-container">
            <div class="card card-pov" onclick="mostraGallery('pov')">
                <img src="https://res.cloudinary.com/digxjfslu/image/upload/v1776864950/LOGO_NEON_1_pk6wb7.png" alt="POV">
                <div class="btn-enter">Apri Gallery</div>
            </div>

            <div class="card card-t2a" onclick="mostraGallery('t2a')">
                <img src="https://res.cloudinary.com/digxjfslu/image/upload/v1776864906/photo_6001124706695711669_y_hcjnky.jpg" alt="Time2Ape" style="border-radius: 15px;">
                <div class="btn-enter">Apri Gallery</div>
            </div>
        </div>
    </div>

    <div id="gallery-page">
        <div class="gallery-header">
            <h1 id="titolo-gallery" style="letter-spacing: 8px; margin: 0;">GALLERY</h1>
            <button class="btn-back" onclick="tornaHome()">← BACK TO HUB</button>
        </div>
        <div class="photo-grid" id="griglia-foto"></div>
    </div>

        function mostraGallery(tipo) {
            const home = document.getElementById('home-page');
            const gallery = document.getElementById('gallery-page');
            const griglia = document.getElementById('griglia-foto');
            const titolo = document.getElementById('titolo-gallery');

            griglia.innerHTML = '';
            home.classList.add('hidden');
            gallery.style.display = 'block';

            let lista = tipo === 'pov' ? fotoPOV : fotoT2A;
            titolo.innerText = tipo === 'pov' ? 'POV GALLERY' : 'TIME2APE GALLERY';
            titolo.style.color = tipo === 'pov' ? 'var(--pov-pink)' : 'var(--t2a-cyan)';

            lista.forEach(url => {
                const img = document.createElement('img');
                img.src = url.replace('/upload/', '/upload/w_600,q_auto,f_auto/');
                img.onclick = () => openLightbox(url);
                griglia.appendChild(img);
            });
            window.scrollTo(0,0);
        }

        function tornaHome() {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('gallery-page').style.display = 'none';
        }

        function openLightbox(url) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lb-img');
            lbImg.src = url.replace('/upload/', '/upload/w_1200,q_auto,f_auto/');
            lb.style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }
